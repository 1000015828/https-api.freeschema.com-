<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do App (FreeSchema)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>To-Do List</h1>

    <!-- Add Task -->
    <div class="task-input">
      <input type="text" id="taskInput" placeholder="Enter task..." />
      <button onclick="addTask()">Add</button>
    </div>

    <!-- Task List -->
    <ul id="taskList"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
